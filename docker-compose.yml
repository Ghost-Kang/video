# OpenRHTV Cascade — W5D2 deploy compose
#
# Single-host topology for cohort 内测 (5-10 creators).
# Backend SQLite persisted on host volume; restart unless-stopped both.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascade-backend
    restart: unless-stopped
    # W5D2 log rotation — prevent unbounded json-file logs from filling
    # the 80G lighthouse disk. 10MB × 5 rotated files = ~50MB cap per svc.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    env_file:
      - .env  # ARK_API_KEY, INVITE_CODES, CASCADE_UPSTREAM, etc.
    environment:
      # Marks this as a prod-like deploy so the auth layer fails closed:
      # config.py aborts boot if INVITE_CODES is empty, and admin endpoints
      # return 403 if CASCADE_ADMIN_TOKEN is unset (rather than silently open).
      ENV: ${ENV:-prod}
      # Sane prod defaults — override via .env if needed
      CASCADE_UPSTREAM: ${CASCADE_UPSTREAM:-doubao_direct}
      TOPRADOR_RESOLVER_MODE: ${TOPRADOR_RESOLVER_MODE:-douyin_share}
      # CASCADE_DB_PATH no longer required — persistence/db.py now detects
      # container layout via Path("/app/src").exists() and defaults to the
      # volume-mounted /app/data/cascade.db. The env var is still honored
      # as an override for tests / non-standard layouts.
    volumes:
      - ./data:/app/data
    # Backend binds 0.0.0.0:8765 + 0.0.0.0:8766 internally; we do NOT
    # publish ports to host — nginx is the only ingress.
    expose:
      - "8765"
      - "8766"
    networks:
      - cascade
    healthcheck:
      # Dedicated unauthenticated liveness endpoint (not /api/events, which is
      # now admin-gated). 127.0.0.1 not localhost — the backend binds IPv4 only;
      # `localhost` can resolve to ::1 first and fail (see frontend Dockerfile).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/api/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cascade-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # nginx listens on 80; cf tunnel / caddy points here.
      # If running standalone with TLS, swap for 443 + mount cert volume.
      - "80:80"
    volumes:
      # Per-scene clips/posters the backend writes to ./data/media are served
      # by nginx at /media/ (see nginx.conf `location ^~ /media/`). Read-only —
      # nginx never writes. Same host ./data the backend mounts at /app/data.
      - ./data/media:/usr/share/nginx/media:ro
    networks:
      - cascade

networks:
  cascade:
    driver: bridge
