# OpenRHTV Cascade — nginx reverse proxy + static SPA
#
# Backend HTTP API at backend:8766 (docker network DNS).
# Backend WS at backend:8765 (separate port, needs Upgrade).
# Frontend dist is statically served + SPA fallback to /index.html.

upstream cascade_api {
  server backend:8766;
}

upstream cascade_ws {
  server backend:8765;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Avoid issues with Chinese filenames in legal/*.md
  charset utf-8;

  # WebSocket route — Cascade chat traffic
  location /ws {
    proxy_pass http://cascade_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # ARK calls can take 60-120s — bump read timeout above default 60s
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # HTTP API route — /api/*
  location /api/ {
    proxy_pass http://cascade_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
  }

  # Static assets — long cache for hashed files
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # W5D3 P1 — index.html must NOT cache. Vite hashes JS/CSS filenames into
  # cache-busting names, but only index.html links them. If the browser caches
  # index.html after a deploy, it serves the OLD html that links to NOW-DELETED
  # JS bundles → users see blank page / 404. Force revalidation on every load.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires off;
    try_files $uri =404;
  }

  # SPA fallback — all other paths go to index.html so React Router takes over
  location / {
    try_files $uri $uri/ /index.html;
  }
}
